kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/suman-kumarsahusu/argocd-in.git
    targetRevision: main
    path: demoapp
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
