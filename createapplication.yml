kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: demo
  namespace: argocd
spec:
  project: demo
  source:
    repoURL: https://github.com/suman-kumarsahusu/argocd-in.git
    targetRevision: main
    path: demoapp
  destination:
    server: https://kubernetes.default.svc
    namespace: devops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
