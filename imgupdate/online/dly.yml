apiVersion: apps/v1
kind: Deployment
metadata:
    name: online-shop
    namespace: argocd
spec:
  replicas: 5
  selector:
      matchLabels:
          app: online-shop
  template:
      metadata:
          labels:
              app: online-shop
      spec:
        containers:
              - name: online-shop
                image: sumansahudockerhub/online:v1.0.0
                ports:
                  - containerPort: 3000
---

apiVersion: v1
kind: Service
metadata:
    name: online-shop-service
    namespace: argocd
spec:
  selector:
        app: online-shop
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
