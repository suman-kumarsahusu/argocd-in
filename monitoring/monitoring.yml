apiVersion: monitoring.coreos.com/v1 
kind: ServiceMonitor                 
metadata:
    name: argocd-metrics               
    namespace: argocd                  
    labels:
        release: kube-prometheus-stack
spec:
  namespaceSelector:
    any: true
  selector:
        matchLabels:
            app.kubernetes.io/name: argocd-metrics
  endpoints:
      - port: metrics     
              

