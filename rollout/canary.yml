kind: Rollout
apiVersion: argoproj.io/v1alpha1
metadata:
  name: canary
  namespace: argocd
spec:
  replicas: 3
  strategy:
   canary:
     steps:
       - setWeight: 20
       - pause: {duration: 10}
       - setWeight: 50
       - pause: {duration: 10}
       - setWeight: 80
       - pause: {duration: 10}
       - setWeight: 100
  selector:
    matchLabels:
       app: canaryroll
  template:
    metadata:
      labels:
        app: canaryroll
    spec:
      containers:
        - name: canary
          image: nginx:1.19
          ports:
            - containerPort: 80     

